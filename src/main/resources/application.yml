server:
  port: 8080

spring:
  application:
    name: chatbot
  datasource:
    url: jdbc:postgresql://dpg-d8vc0j6rnols73866vjg-a.oregon-postgres.render.com:5432/chatbot_3bjm
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format-sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  version: ${APP_VERSION:0.0.1-SNAPSHOT}
  storage:
    upload-dir: ${UPLOAD_DIR:./uploads}
  jwt:
    secret: ${JWT_SECRET:umaChaveSecretaMuitoSeguraComPeloMenos256Bits}
    expiration: 86400000
  rag:
    ollama:
      url: http://localhost:11434
      model: nomic-embed-text
      chat-model: llama3.2
      timeout: 5000
    chunking:
      max-size: 512
      overlap: 64
    retrieval:
      top-k: 5
      min-score: 0.7
  n8n:
    webhook-url: ${N8N_WEBHOOK_URL:http://localhost:5678/webhook/rag}
    enabled: false

logging:
  level:
    root: INFO
    com.plataforma.conversacional: DEBUG
