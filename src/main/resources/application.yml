server:
  port: 8080

spring:
  application:
    name: chatbot
  datasource:
    url: jdbc:postgresql://dpg-d8vc0j6rnols73866vjg-a.oregon-postgres.render.com:5432/chatbot_3bjm
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format-sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  version: ${APP_VERSION:0.0.1-SNAPSHOT}
  storage:
    upload-dir: ${UPLOAD_DIR:./uploads}
  jwt:
    secret: ${JWT_SECRET:umaChaveSecretaMuitoSeguraComPeloMenos256Bits}
    expiration: 86400000

logging:
  level:
    root: INFO
    com.plataforma.conversacional: DEBUG
